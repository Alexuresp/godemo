name: Build and push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alexuresp/godemo

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: godemo
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image SHA
        id: image_sha
        run: |
          SHA_TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | grep -v 'latest' | head -n1)
          IMAGE_SHA=$(echo "$SHA_TAG" | sed 's/.*://')
          echo "sha=$IMAGE_SHA" >> $GITHUB_OUTPUT
          echo "Extracted image SHA: $IMAGE_SHA"

      - name: Update fleet deployment image tag
        run: |
          sed -i "s|image: ghcr.io/alexuresp/godemo:.*|image: ghcr.io/alexuresp/godemo:${{ steps.image_sha.outputs.sha }}|" fleet/godemo/deployment.yaml
          cat fleet/godemo/deployment.yaml

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fleet/godemo/deployment.yaml
          git diff --cached --quiet || git commit -m "chore: update image tag to ${{ steps.image_sha.outputs.sha }}"
          git pull --rebase origin main
          git push
