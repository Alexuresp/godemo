name: Build and push

on:
  push:
    branches: [main, develop]
    paths:
      - 'godemo/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: godemo-build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name and deployment path
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "image_name=godemo" >> $GITHUB_OUTPUT
            echo "deploy_path=fleet/godemo/deployment.yaml" >> $GITHUB_OUTPUT
            echo "push_branch=main" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "image_name=godemo-dev" >> $GITHUB_OUTPUT
            echo "deploy_path=fleet/godemo-dev/deployment.yaml" >> $GITHUB_OUTPUT
            echo "push_branch=develop" >> $GITHUB_OUTPUT
            echo "latest_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/alexuresp/${{ steps.vars.outputs.image_name }}
          tags: |
            type=sha,prefix=
            ${{ github.ref == 'refs/heads/main' && 'type=raw,value=latest,enable={{is_default_branch}}' || '' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: godemo
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract image SHA
        id: image_sha
        run: |
          SHA_TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | grep -v 'latest' | head -n1)
          IMAGE_SHA=$(echo "$SHA_TAG" | sed 's/.*://')
          echo "sha=$IMAGE_SHA" >> $GITHUB_OUTPUT
          echo "Extracted image SHA: $IMAGE_SHA"

      - name: Update fleet deployment image tag
        run: |
          sed -i "s|image: ghcr.io/alexuresp/${{ steps.vars.outputs.image_name }}:.*|image: ghcr.io/alexuresp/${{ steps.vars.outputs.image_name }}:${{ steps.image_sha.outputs.sha }}|" ${{ steps.vars.outputs.deploy_path }}
          cat ${{ steps.vars.outputs.deploy_path }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ steps.vars.outputs.deploy_path }}
          git diff --cached --quiet || git commit -m "chore(${{ steps.vars.outputs.image_name }}): update image tag to ${{ steps.image_sha.outputs.sha }}"
          git pull --rebase origin ${{ steps.vars.outputs.push_branch }}
          git push
