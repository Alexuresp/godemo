apiVersion: apps/v1
kind: Deployment
metadata:
  name: godemo
  labels:
    app: godemo-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: godemo-dev
  template:
    metadata:
      labels:
        app: godemo-dev
    spec:
      containers:
        - name: godemo
          image: ghcr.io/alexuresp/godemo-dev:894c483
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
