apiVersion: batch/v1
kind: CronJob
metadata:
  name: pg-backup
  labels:
    app: pg-backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: postgres:16-alpine
              env:
                - name: GODEMO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pg-backup-credentials
                      key: GODEMO_PASSWORD
                - name: GODEMO_DEV_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pg-backup-credentials
                      key: GODEMO_DEV_PASSWORD
                - name: LARAVEL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pg-backup-credentials
                      key: LARAVEL_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_DIR=/backups
                  DATE=$(date +%Y%m%d_%H%M%S)
                  echo "Starting PostgreSQL backup at $DATE"
                  PGPASSWORD=$GODEMO_PASSWORD pg_dump -h postgres.godemo.svc.cluster.local -U godemo -d godemo -Fc -f $BACKUP_DIR/godemo_$DATE.dump
                  PGPASSWORD=$GODEMO_DEV_PASSWORD pg_dump -h postgres.godemo-dev.svc.cluster.local -U godemo-dev -d godemo-dev -Fc -f $BACKUP_DIR/godemo-dev_$DATE.dump
                  PGPASSWORD=$LARAVEL_PASSWORD pg_dump -h postgres.laravel.svc.cluster.local -U laravel -d laravel -Fc -f $BACKUP_DIR/laravel_$DATE.dump
                  find $BACKUP_DIR -name "*.dump" -mtime +7 -delete
                  echo "Backup completed"
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: pg-backups
