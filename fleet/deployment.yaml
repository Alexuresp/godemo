apiVersion: apps/v1
kind: Deployment
metadata:
  name: godemo
  labels:
    app: godemo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: godemo
  template:
    metadata:
      labels:
        app: godemo
    spec:
      containers:
        - name: godemo
          image: ghcr.io/alexuresp/godemo:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
