apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laravel
  labels:
    app: laravel
spec:
  rules:
    - host: laravel.192-168-1-151.traefik.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laravel
                port:
                  number: 80
