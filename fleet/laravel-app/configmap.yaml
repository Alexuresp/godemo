apiVersion: v1
kind: ConfigMap
metadata:
  name: laravel
  labels:
    app: laravel
data:
  APP_NAME: Laravel
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: http://laravel.192-168-1-151.traefik.me
  LOG_CHANNEL: stack
  LOG_LEVEL: debug
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: laravel
  DB_USERNAME: laravel
  REDIS_HOST: redis
  REDIS_PASSWORD: null
  REDIS_PORT: "6379"
  CACHE_DRIVER: redis
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
